<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tudo Com Laser - Produtos Personalizados</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        elegant: ['"Playfair Display"', 'serif'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        /* BASE CLAYMORPHISM (TEMA CLARO E ESCURO) */
        :root {
            --clay-bg: #e6eef5;
            --clay-shadow-light: #ffffff;
            --clay-shadow-dark: #c5d2e0;
        }
        .dark {
            --clay-bg: #1a1c23;
            --clay-shadow-light: #242730;
            --clay-shadow-dark: #101116;
        }

        body {
            background-color: var(--clay-bg);
            -webkit-tap-highlight-color: transparent;
        }

        .clay-surface {
            background: var(--clay-bg);
            box-shadow: 6px 6px 12px var(--clay-shadow-dark), 
                       -6px -6px 12px var(--clay-shadow-light);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .clay-surface-inset {
            background: var(--clay-bg);
            box-shadow: inset 4px 4px 8px var(--clay-shadow-dark), 
                       inset -4px -4px 8px var(--clay-shadow-light);
        }

        .clay-wa {
            background: #25D366;
            box-shadow: 4px 4px 10px rgba(37, 211, 102, 0.4), 
                       -4px -4px 10px rgba(255, 255, 255, 0.6);
            border: none;
        }
        .dark .clay-wa {
            box-shadow: 4px 4px 10px rgba(37, 211, 102, 0.2), 
                       -4px -4px 10px rgba(37, 211, 102, 0.1);
        }

        .clay-btn:active, .clay-wa:active {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2), 
                       inset -4px -4px 8px rgba(255,255,255,0.2);
            transform: scale(0.98);
        }

        /* ANIMAÇÕES GERAIS */
        @keyframes story-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-story-progress { animation-name: story-progress; animation-timing-function: linear; animation-fill-mode: forwards; }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll { animation: scroll 20s linear infinite; }
        .animate-scroll:hover { animation-play-state: paused; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes pulse-whatsapp {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        .clay-pulse { animation: pulse-whatsapp 2s infinite ease-in-out; }

        /* ANIMAÇÃO DO FOGUETE DECOLANDO */
        @keyframes rocket-launch {
            0% { transform: translateY(0) scale(1); }
            10% { transform: translateX(-3px) translateY(2px) rotate(-3deg); }
            20% { transform: translateX(3px) translateY(-2px) rotate(3deg); }
            30% { transform: translateX(-3px) translateY(2px) rotate(-3deg); }
            40% { transform: translateX(3px) translateY(-2px) rotate(3deg); }
            50% { transform: translateX(0) translateY(0) scale(0.9); }
            100% { transform: translateY(-150vh) scale(0.5); opacity: 0; }
        }
        .rocket-takeoff {
            animation: rocket-launch 1.2s ease-in forwards !important;
            pointer-events: none;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
    </style>
</head>

                            <div class="absolute inset-y-0 right-0 w-6 md:w-16 bg-gradient-to-l from-[var(--clay-bg)] to-transparent z-10 pointer-events-none"></div>
                            
                            <div class="flex w-[200%] animate-scroll">
                                ${workImagesHTML}
                            </div>
                        </div>
                    </div>

                </div>
            `;
        }

        function getCategoryHTML() {
            const cat = CATEGORIES.find(c => c.id === selectedCategory);
            const products = PRODUCTS_DB[selectedCategory] || [];

            // TIPO 4: MINIATURAS MAIORES MUDANDO O GRID PARA MÁXIMO 3 COLUNAS
            let productsHTML = products.map((product) => `
                <button onclick="openProductModal('${product.id}')" class="relative w-full aspect-[9/16] rounded-2xl overflow-hidden group transition-all text-left clay-surface clay-btn p-1 md:p-1.5">
                    <div class="relative w-full h-full rounded-xl overflow-hidden">
                        ${product.img.endsWith('.mp4') ? 
                            `<video src="${product.img}" autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-90 group-hover:opacity-100"></video>` : 
                            `<img src="${product.img}" alt="${product.name}" loading="lazy" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-90 group-hover:opacity-100" />`
                        }
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent flex items-end p-3 md:p-4">
                            <div class="w-full">
                                <div class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center mb-2 border border-white/20">
                                    <i data-lucide="sparkles" class="w-3.5 h-3.5 text-[#D4AF37]"></i>
                                </div>
                                <h3 class="text-white text-xs sm:text-sm md:text-base font-bold line-clamp-2 leading-tight drop-shadow-md">
                                    ${product.name}
                                </h3>
                                ${product.size ? `<span class="text-[#D4AF37] text-[10px] md:text-xs font-extrabold uppercase mt-1 block">${product.size}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </button>
            `).join('');

            return `
                <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="mb-4 md:mb-6 text-center sm:text-left pt-2">
                        <h1 class="text-3xl sm:text-4xl md:text-5xl font-elegant italic font-bold mb-1 text-[#D4AF37]">${cat.name}</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-xs sm:text-sm md:text-lg">${cat.desc}</p>
                    </div>

                    <!-- LIMITADO A 3 COLUNAS PARA DEIXAR AS FOTOS MAIORES -->
                    <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 md:gap-5">
                        ${productsHTML}
                    </div>

                    ${products.length === 0 ? `
                        <div class="text-center py-12 clay-surface rounded-2xl mt-4">
                            <p class="text-slate-500 text-sm md:text-lg">Novos produtos em breve!</p>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function startStoryTimer() {
            stopStoryTimer();
            const currentMediaUrl = STORY_IMAGES[activeStoryIndex];
            const bar = document.getElementById(`story-bar-${activeStoryIndex}`);
            
            const playAnimation = (durationMs) => {
                if (bar) {
                    bar.style.animationDuration = `${durationMs}ms`;
                    bar.className = `h-full bg-[#D4AF37] rounded-full`; 
                    void bar.offsetWidth; 
                    bar.className = `h-full bg-[#D4AF37] rounded-full animate-story-progress`;
                }
                storyTimer = setTimeout(() => handleNextStory(null), durationMs);
            };

            if (currentMediaUrl.endsWith('.mp4')) {
                const video = document.getElementById(`story-media-${activeStoryIndex}`);
                if (video) {
                    if (video.readyState >= 1) { 
                        playAnimation(video.duration * 1000);
                    } else {
                        playAnimation(10000); 
                        video.onloadedmetadata = () => {
                            stopStoryTimer(); 
                            playAnimation(video.duration * 1000);
                        };
                    }
                } else {
                    playAnimation(STORY_DURATION);
                }
            } else {
                playAnimation(STORY_DURATION);
            }
        }

        function stopStoryTimer() {
            if (storyTimer) clearTimeout(storyTimer);
        }

        function handleNextStory(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            activeStoryIndex = (activeStoryIndex + 1) % STORY_IMAGES.length;
            updateStoryDOM();
        }

        function handlePrevStory(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            activeStoryIndex = (activeStoryIndex - 1 + STORY_IMAGES.length) % STORY_IMAGES.length;
            updateStoryDOM();
        }

        function updateStoryDOM() {
            for (let i = 0; i < STORY_IMAGES.length; i++) {
                const bar = document.getElementById(`story-bar-${i}`);
                if (!bar) continue;
                if (i < activeStoryIndex) bar.className = `h-full bg-[#D4AF37] rounded-full w-full`;
                else if (i > activeStoryIndex) bar.className = `h-full bg-[#D4AF37] rounded-full w-0`;
                else bar.className = `h-full bg-[#D4AF37] rounded-full w-0`; 
            }

            for (let i = 0; i < STORY_IMAGES.length; i++) {
                const media = document.getElementById(`story-media-${i}`);
                if (!media) continue;
                if (i === activeStoryIndex) {
                    media.className = `absolute inset-0 w-full h-full object-cover rounded-3xl md:rounded-[2rem] transition-opacity duration-700 opacity-100 z-10`;
                    if (media.tagName === 'VIDEO') {
                        media.currentTime = 0;
                        media.play().catch(e => console.log("Erro video:", e));
                    }
                } else {
                    media.className = `absolute inset-0 w-full h-full object-cover rounded-3xl md:rounded-[2rem] transition-opacity duration-700 opacity-0 z-0 pointer-events-none`;
                    if (media.tagName === 'VIDEO') media.pause();
                }
            }
            startStoryTimer();
        }

        function navigateTo(id) {
            if (id === 'home') {
                currentView = 'home';
                selectedCategory = null;
            } else {
                currentView = 'category';
                selectedCategory = id;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderMenu();
            renderView();
        }

        function openProductModal(productId) {
            const product = PRODUCTS_DB[selectedCategory]?.find(p => p.id === productId);
            if (!product) return;

            const modal = document.getElementById('product-modal');
            const content = document.getElementById('product-modal-content');
            
            content.innerHTML = `
                <button onclick="closeProductModal()" class="absolute top-3 right-3 z-10 w-8 h-8 flex items-center justify-center rounded-full clay-surface text-slate-500 hover:text-[#D4AF37] transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>

                <div class="relative w-full h-[260px] md:h-80 shrink-0 cursor-pointer group p-1" onclick="setFullscreenImage('${product.img}')">
                    <div class="w-full h-full rounded-2xl overflow-hidden relative">
                        ${product.img.endsWith('.mp4') ? 
                            `<video src="${product.img}" autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"></video>` : 
                            `<img src="${product.img}" alt="${product.name}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" />`
                        }
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/20 transition-opacity">
                            <span class="bg-black/60 text-white text-[10px] md:text-xs px-3 py-1.5 rounded-full backdrop-blur-sm">Tocar para ampliar</span>
                        </div>
                    </div>
                </div>

                <div class="p-4 flex flex-col flex-1">
                    <h3 class="text-base md:text-lg font-bold mb-3 text-slate-800 dark:text-neutral-200 leading-tight">${product.name}</h3>
                    
                    ${product.size ? `
                        <div class="mb-4 clay-surface-inset p-3 rounded-xl">
                            <div class="flex justify-between items-center text-xs font-semibold">
                                <span class="text-slate-500">Capacidade:</span> 
                                <span class="text-slate-800 dark:text-neutral-200">${product.size}</span>
                            </div>
                        </div>
                    ` : ''}

                    <div class="mt-auto pt-2">
                        <button onclick="launchWhatsApp(event, '${product.name}')" class="w-full flex items-center justify-center gap-2 text-white px-4 py-3 md:py-4 rounded-xl font-bold text-xs md:text-sm clay-wa transition-transform">
                            <i data-lucide="message-circle" class="w-4 h-4"></i>
                            Pedir orçamento
                        </button>
                    </div>
                </div>
            `;
            
            lucide.createIcons();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeProductModal() {
            const modal = document.getElementById('product-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function setFullscreenImage(src) {
            const modal = document.getElementById('fullscreen-modal');
            const content = document.getElementById('fullscreen-content');
            
            if (src) {
                closeProductModal();
                if (src.endsWith('.mp4')) {
                    content.innerHTML = `<video src="${src}" controls autoplay playsinline class="max-w-full max-h-[85vh] object-contain rounded-2xl clay-surface p-1 md:p-2 pointer-events-auto"></video>`;
                } else {
                    content.innerHTML = `<img src="${src}" alt="Ampliada" class="max-w-full max-h-[85vh] object-contain rounded-2xl clay-surface p-1 md:p-2 pointer-events-auto" />`;
                }
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                content.innerHTML = '';
            }
        }

        function closeModals(e) {
            if (e.target.id === 'product-modal') closeProductModal();
            if (e.target.id === 'fullscreen-modal') setFullscreenImage(null);
        }

        // FOGUETE DECOLANDO AO WHATSAPP
        function launchWhatsApp(event, productName = "") {
            if (event && event.currentTarget) {
                event.preventDefault();
                event.stopPropagation();
                
                const btn = event.currentTarget;
                const rect = btn.getBoundingClientRect();
                
                const clone = btn.cloneNode(true);
                clone.style.position = 'fixed';
                clone.style.left = rect.left + 'px';
                clone.style.top = rect.top + 'px';
                clone.style.width = rect.width + 'px';
                clone.style.height = rect.height + 'px';
                clone.style.margin = '0';
                clone.style.zIndex = '999999';
                clone.classList.remove('clay-pulse'); 
                
                clone.innerHTML = `<i data-lucide="rocket" class="w-6 h-6 md:w-8 md:h-8 text-white"></i>`;
                
                document.body.appendChild(clone);
                lucide.createIcons();
                
                btn.style.opacity = '0';
                clone.classList.add('rocket-takeoff');
                
                const text = productName ? `${WHATSAPP_BASE_MSG}: ${productName}` : WHATSAPP_BASE_MSG;
                const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
                
                setTimeout(() => {
                    window.location.href = url;
                    setTimeout(() => {
                        if(clone) clone.remove();
                        if(btn) btn.style.opacity = '1';
                    }, 800);
                }, 1000); 

            } else {
                const text = productName ? `${WHATSAPP_BASE_MSG}: ${productName}` : WHATSAPP_BASE_MSG;
                window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
            }
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            updateThemeUI();
        }

        function updateThemeUI() {
            const html = document.documentElement;
            const themeText = document.getElementById('theme-text');
            const themeIcon = document.getElementById('theme-icon');
            
            if (isDarkMode) {
                html.classList.add('dark');
                html.classList.remove('light');
                if (themeText) themeText.innerText = 'Escuro';
                if (themeIcon) themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                html.classList.add('light');
                html.classList.remove('dark');
                if (themeText) themeText.innerText = 'Claro';
                if (themeIcon) themeIcon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
