        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* CLAYMORPHISM CORE CLASSES */
        .clay-surface {
            background-color: #e6eef5;
            border-radius: 24px;
            box-shadow: 
                10px 10px 20px rgba(166, 180, 200, 0.4),
                -10px -10px 20px rgba(255, 255, 255, 0.8),
                inset -5px -5px 10px rgba(166, 180, 200, 0.2),
                inset 5px 5px 10px rgba(255, 255, 255, 0.5);
            border: none;
            transition: all 0.3s ease;
        }

        .clay-btn {
            background-color: #e6eef5;
            border-radius: 16px;
            box-shadow: 
                6px 6px 12px rgba(166, 180, 200, 0.4),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset -3px -3px 6px rgba(166, 180, 200, 0.2),
                inset 3px 3px 6px rgba(255, 255, 255, 0.6);
            border: none;
            transition: all 0.2s ease;
        }

        .clay-btn-pressed {
            background-color: #e6eef5;
            border-radius: 16px;
            box-shadow: 
                inset 6px 6px 12px rgba(166, 180, 200, 0.4),
                inset -6px -6px 12px rgba(255, 255, 255, 0.8);
            border: none;
            transition: all 0.2s ease;
        }

        .clay-wa {
            background-color: #25D366;
            border-radius: 9999px;
            box-shadow: 
                6px 6px 15px rgba(37, 211, 102, 0.3),
                -4px -4px 10px rgba(255, 255, 255, 0.5),
                inset -4px -4px 8px rgba(18, 140, 63, 0.4),
                inset 4px 4px 8px rgba(100, 255, 140, 0.6);
            border: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .clay-wa:active {
            transform: scale(0.95);
            box-shadow: 
                inset 6px 6px 12px rgba(18, 140, 63, 0.5),
                inset -6px -6px 12px rgba(100, 255, 140, 0.7);
        }

        /* DARK MODE CLAY */
        .dark .clay-surface {
            background-color: #1a1c23;
            box-shadow: 
                10px 10px 20px rgba(0, 0, 0, 0.4),
                -10px -10px 20px rgba(40, 45, 55, 0.5),
                inset -5px -5px 10px rgba(0, 0, 0, 0.3),
                inset 5px 5px 10px rgba(50, 55, 65, 0.4);
        }
        .dark .clay-btn {
            background-color: #1a1c23;
            box-shadow: 
                6px 6px 12px rgba(0, 0, 0, 0.4),
                -6px -6px 12px rgba(40, 45, 55, 0.5),
                inset -3px -3px 6px rgba(0, 0, 0, 0.3),
                inset 3px 3px 6px rgba(50, 55, 65, 0.4);
        }
        .dark .clay-btn-pressed {
            background-color: #1a1c23;
            box-shadow: 
                inset 6px 6px 12px rgba(0, 0, 0, 0.5),
                inset -6px -6px 12px rgba(40, 45, 55, 0.4);
        }
        .dark .clay-wa {
            box-shadow: 
                6px 6px 15px rgba(0, 0, 0, 0.4),
                inset -4px -4px 8px rgba(18, 140, 63, 0.4),
                inset 4px 4px 8px rgba(100, 255, 140, 0.6);
        }

        @keyframes story-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-story-progress { animation-name: story-progress; animation-timing-function: linear; animation-fill-mode: forwards; }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-scroll { animation: scroll 20s linear infinite; }
        .animate-scroll:hover { animation-play-state: paused; }

        @keyframes pulse-whatsapp {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        .clay-pulse { animation: pulse-whatsapp 2s infinite ease-in-out; }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            
            if (isDarkMode) {
                html.classList.add('dark');
                themeIcon.setAttribute('data-lucide', 'sun');
                themeText.textContent = 'Claro';

                themeIcon.setAttribute('data-lucide', 'moon');

            selectedCategory = null;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderSidebar();
            renderView();
        }

        function navigateToCategory(catId) {
            currentView = 'category';
            selectedCategory = CATEGORIES.find(c => c.id === catId);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderSidebar();
            renderView();
        }

        function renderSidebar() {
            const container = document.getElementById('nav-container');
            
            let html = `
                <button onclick="navigateToHome()" class="w-full text-center md:text-left px-1 py-3 md:px-5 md:py-4 font-bold transition-all duration-200 flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-2
                    ${currentView === 'home' ? 'clay-btn-pressed text-[#D4AF37]' : 'clay-btn text-slate-600 dark:text-neutral-400'}">
                    <span class="leading-tight text-[10px] md:text-sm">Início</span>
                </button>
            `;

            CATEGORIES.forEach(cat => {
                const isActive = selectedCategory && selectedCategory.id === cat.id;
                html += `
                    <button onclick="navigateToCategory('${cat.id}')" class="w-full text-center md:text-left px-1 py-3 md:px-5 md:py-4 font-semibold transition-all duration-200 flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-2
                        ${isActive ? 'clay-btn-pressed text-[#D4AF37]' : 'clay-btn text-slate-600 dark:text-neutral-400'}">
                        <span class="leading-tight text-[10px] md:text-sm whitespace-normal md:whitespace-nowrap">${cat.name}</span>
                    </button>
                `;
            });

            container.innerHTML = html;
        }

        function renderView() {
            const container = document.getElementById('content-container');
            
            if (currentView === 'home') {
                container.innerHTML = getHomeHTML();
                // Pequeno atraso para garantir que a renderização inicial terminou
                setTimeout(() => updateStoryDOM(), 50);
            } else {
                stopStoryTimer();
                container.innerHTML = getCategoryHTML();
            }
            lucide.createIcons();
        }

        function getHomeHTML() {
            let storyBars = STORY_IMAGES.map((_, idx) => `
                <div class="h-1.5 flex-1 bg-black/20 dark:bg-white/20 rounded-full overflow-hidden">
                    <div id="story-bar-${idx}" class="h-full bg-[#D4AF37] rounded-full w-0"></div>
                </div>
            `).join('');

            let storyMedia = STORY_IMAGES.map((media, idx) => {
                const isActiveClass = idx === activeStoryIndex ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none';
                if (media.endsWith('.mp4')) {
                    return `<video id="story-media-${idx}" src="${media}" muted playsinline class="absolute inset-0 w-full h-full object-cover rounded-[1rem] md:rounded-[1.7rem] transition-opacity duration-700 ${isActiveClass}"></video>`;
                } else {
                    return `<img id="story-media-${idx}" src="${media}" class="absolute inset-0 w-full h-full object-cover rounded-[1rem] md:rounded-[1.7rem] transition-opacity duration-700 ${isActiveClass}" />`;
                }
            }).join('');

            let workImagesHTML = WORK_IMAGES.map((img) => `
                <div class="w-[120px] md:w-[200px] shrink-0 px-1 md:px-2 cursor-pointer transition-transform hover:scale-105" onclick="setFullscreenImage('${img}')">
                    <div class="aspect-[3/4] rounded-lg md:rounded-xl overflow-hidden clay-surface p-1">
                        <img src="${img}" alt="Trabalho" class="w-full h-full object-cover rounded-[0.5rem] md:rounded-[0.8rem]" />
                    </div>
                </div>
            `).join('');
            
            // Duplicando a lista para garantir que a animação de scroll infinito fique sem falhas
            workImagesHTML += workImagesHTML;

            return `
                <div class="animate-in fade-in duration-500 flex flex-col items-center justify-center gap-6 md:gap-12 pt-0 md:pt-4">
                    <div class="w-full text-center space-y-2 md:space-y-3 max-w-2xl mx-auto clay-surface p-4 md:p-6">
                        <h1 class="text-3xl sm:text-4xl md:text-6xl lg:text-7xl font-elegant italic font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-slate-400 via-[#D4AF37] to-[#B8860B] pb-1 md:pb-2">
                            Destaques
                        </h1>
                        <p class="text-sm md:text-2xl font-bold text-[#D4AF37] flex items-center justify-center gap-1.5 md:gap-2">
                            Foto Gravação
                        </p>
                    </div>

                    <div class="shrink-0 flex justify-center py-2 w-full">
                        <div class="relative block w-[160px] min-[380px]:w-[200px] sm:w-[280px] md:w-[400px] aspect-[9/16] clay-surface p-2 md:p-4 group">
                            
                            <button class="absolute inset-y-0 left-0 w-12 md:w-16 z-30 flex items-center justify-center cursor-pointer" onclick="handlePrevStory(event)">
                                <div class="clay-btn p-1.5 md:p-2 text-slate-800 dark:text-white ml-1 md:ml-2 active:scale-95 transition-transform"><i data-lucide="chevron-left" class="w-4 h-4 md:w-6 md:h-6"></i></div>
                            </button>
                            <button class="absolute inset-y-0 right-0 w-12 md:w-16 z-30 flex items-center justify-center cursor-pointer" onclick="handleNextStory(event)">
                                <div class="clay-btn p-1.5 md:p-2 text-slate-800 dark:text-white mr-1 md:mr-2 active:scale-95 transition-transform"><i data-lucide="chevron-right" class="w-4 h-4 md:w-6 md:h-6"></i></div>
                            </button>

                            <div class="absolute top-4 md:top-8 left-0 w-full px-4 md:px-6 flex gap-1.5 md:gap-2 z-20">
                                ${storyBars}
                            </div>
                            
                            <div class="relative w-full h-full rounded-[1rem] md:rounded-[1.7rem] overflow-hidden shadow-inner cursor-pointer" onclick="handleRedirectWhatsApp('Destaques')">
                                ${storyMedia}
                                <div class="absolute top-0 left-0 w-full h-20 md:h-24 bg-gradient-to-b from-black/40 to-transparent z-10 pointer-events-none"></div>
                            </div>
                        </div>
                    </div>

                    <div class="w-full mt-6 md:mt-12 overflow-hidden clay-surface py-4 md:py-6">
                        <h2 class="text-xl md:text-4xl font-elegant italic font-bold tracking-wide mb-4 md:mb-8 text-center text-[#D4AF37]">
                            Nossos Trabalhos
                        </h2>
                        <div class="relative w-full flex">
                            <div class="absolute inset-y-0 left-0 w-4 md:w-20 bg-gradient-to-r from-[#e6eef5] dark:from-[#1a1c23] to-transparent z-10 pointer-events-none"></div>
                            <div class="absolute inset-y-0 right-0 w-4 md:w-20 bg-gradient-to-l from-[#e6eef5] dark:from-[#1a1c23] to-transparent z-10 pointer-events-none"></div>
                            
                            <div class="flex w-[200%] animate-scroll gap-1 md:gap-2 px-2 md:px-4">
                                ${workImagesHTML}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getCategoryHTML() {
            const products = PRODUCTS_DB[selectedCategory.id] || [];
            
            let productsHTML = products.map(product => {
                const isVideo = product.img.endsWith('.mp4');
                const mediaHTML = isVideo
                    ? `<video src="${product.img}" autoplay loop muted playsinline class="w-full h-full object-cover rounded-[0.8rem] md:rounded-[1.2rem]"></video>`
                    : `<img src="${product.img}" alt="${product.name}" class="w-full h-full object-cover rounded-[0.8rem] md:rounded-[1.2rem]" />`;
                
                return `
                    <button onclick="openProductModal('${product.id}')" class="relative w-full clay-btn p-1.5 md:p-3 text-left flex flex-col group cursor-pointer hover:-translate-y-1 transition-transform">
                        <div class="w-full aspect-[9/16] relative rounded-[0.8rem] md:rounded-[1.2rem] overflow-hidden shadow-inner bg-black/5 dark:bg-white/5">
                            ${mediaHTML}
                            ${isVideo ? `<div class="absolute top-1 right-1 md:top-2 md:right-2 bg-black/50 text-white p-1 md:p-1.5 rounded-full backdrop-blur-sm"><i data-lucide="play" class="w-3 h-3 md:w-4 md:h-4 fill-white"></i></div>` : ''}
                        </div>
                        <div class="mt-2 md:mt-3 px-1 md:px-2 pb-1">
                            <h3 class="text-slate-800 dark:text-neutral-200 text-[10px] sm:text-xs md:text-base font-bold line-clamp-2 leading-tight">
                                ${product.name}
                            </h3>
                            ${product.size ? `<span class="text-[#D4AF37] text-[8px] md:text-xs font-black uppercase mt-0.5 md:mt-1 block tracking-wider">${product.size}</span>` : ''}
                        </div>
                    </button>
                `;
            }).join('');

            if (products.length === 0) {
                productsHTML = `
                    <div class="col-span-full text-center py-8 md:py-16 clay-surface">
                        <p class="text-slate-500 dark:text-neutral-400 font-semibold text-xs md:text-lg">Novos produtos em breve!</p>
                    </div>
                `;
            }

            return `
                <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="mb-4 md:mb-12 text-center clay-surface p-4 md:p-8">
                        <h1 class="text-2xl sm:text-3xl md:text-5xl font-elegant italic font-extrabold mb-1 md:mb-4 text-[#D4AF37] tracking-wide">${selectedCategory.name}</h1>
                        <p class="text-slate-600 dark:text-neutral-400 font-medium text-[10px] sm:text-xs md:text-lg max-w-2xl mx-auto">${selectedCategory.desc || 'Selecione um produto para expandir'}</p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2 md:gap-6 lg:gap-8">
                        ${productsHTML}
                    </div>
                </div>
            `;
        }

        function startStoryTimer() {
            stopStoryTimer();
            const currentMediaUrl = STORY_IMAGES[activeStoryIndex];
            const bar = document.getElementById(`story-bar-${activeStoryIndex}`);
            
            // Função para aplicar a animação na barra baseada na duração real
            const playAnimation = (durationMs) => {
                if (bar) {
                    bar.style.animationDuration = `${durationMs}ms`;
                    bar.className = `h-full bg-[#D4AF37] rounded-full`; // Limpa
                    void bar.offsetWidth; // Força recarregamento (reflow)
                    bar.className = `h-full bg-[#D4AF37] rounded-full animate-story-progress`;
                }
                storyTimer = setTimeout(() => handleNextStory(null), durationMs);
            };

            if (currentMediaUrl.endsWith('.mp4')) {
                const video = document.getElementById(`story-media-${activeStoryIndex}`);
                if (video) {
                    if (video.readyState >= 1) { // Metadata já carregada
                        playAnimation(video.duration * 1000);
                    } else {
                        playAnimation(10000); // Fallback enquanto carrega os metadados
                        video.onloadedmetadata = () => {
                            stopStoryTimer(); 
                            playAnimation(video.duration * 1000);
                        };
                    }
                } else {
                    playAnimation(STORY_DURATION);
                }
            } else {
                playAnimation(STORY_DURATION);
            }
        }

        function stopStoryTimer() {
            if (storyTimer) clearTimeout(storyTimer);
        }

        function handleNextStory(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            activeStoryIndex = (activeStoryIndex + 1) % STORY_IMAGES.length;
            updateStoryDOM();
        }

        function handlePrevStory(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            activeStoryIndex = (activeStoryIndex - 1 + STORY_IMAGES.length) % STORY_IMAGES.length;
            updateStoryDOM();
        }

        function updateStoryDOM() {
            // Atualiza barrinhas e classes
            for (let i = 0; i < STORY_IMAGES.length; i++) {
                const bar = document.getElementById(`story-bar-${i}`);
                if (!bar) continue;
                if (i < activeStoryIndex) {
                    bar.className = `h-full bg-[#D4AF37] rounded-full w-full`;
                } else if (i > activeStoryIndex) {
                    bar.className = `h-full bg-[#D4AF37] rounded-full w-0`;
                } else {
                    bar.className = `h-full bg-[#D4AF37] rounded-full w-0`; // Limpa ativo para a animação começar do zero
                }
            }

            // Exibe mídia certa e inicia os vídeos
            for (let i = 0; i < STORY_IMAGES.length; i++) {
                const media = document.getElementById(`story-media-${i}`);
                if (!media) continue;
                if (i === activeStoryIndex) {
                    media.className = `absolute inset-0 w-full h-full object-cover rounded-[1rem] md:rounded-[1.7rem] transition-opacity duration-700 opacity-100 z-10`;
                    if (media.tagName === 'VIDEO') {
                        media.currentTime = 0;
                        media.play().catch(e => console.log("Erro ao iniciar vídeo:", e));
                    }
                } else {
                    media.className = `absolute inset-0 w-full h-full object-cover rounded-[1rem] md:rounded-[1.7rem] transition-opacity duration-700 opacity-0 z-0 pointer-events-none`;
                    if (media.tagName === 'VIDEO') {
                        media.pause();
                    }
                }
            }
            startStoryTimer();
        }

        function getProductById(id) {
            for (const cat in PRODUCTS_DB) {
                const product = PRODUCTS_DB[cat].find(p => p.id === id);
                if (product) return product;
            }
            return null;
        }

        function openProductModal(id) {
            const product = getProductById(id);
            if (!product) return;

            const modal = document.getElementById('product-modal');
            const isVideo = product.img.endsWith('.mp4');
            const mediaHTML = isVideo
                ? `<video src="${product.img}" autoplay loop muted playsinline class="w-full h-full object-cover rounded-[1rem] md:rounded-2xl"></video>`
                : `<img src="${product.img}" alt="${product.name}" class="w-full h-full object-cover rounded-[1rem] md:rounded-2xl" />`;

            modal.innerHTML = `
                <div class="relative w-[95%] sm:max-w-sm flex flex-col max-h-[90vh] clay-surface p-2 md:p-4">
                    
                    <button onclick="closeProductModal()" class="absolute top-4 right-4 md:top-6 md:right-6 z-10 w-8 h-8 md:w-10 md:h-10 flex items-center justify-center clay-btn text-slate-800 dark:text-white cursor-pointer">
                        <i data-lucide="x" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </button>
                    
                    <div class="relative w-full h-[300px] md:h-96 shrink-0 cursor-pointer clay-surface p-1.5 md:p-2" onclick="setFullscreenImage('${product.img}')">
                        ${mediaHTML}
                        ${isVideo ? `<div class="absolute inset-0 flex items-center justify-center bg-black/20 rounded-[1rem] md:rounded-2xl pointer-events-none"><i data-lucide="play" class="w-10 h-10 md:w-12 md:h-12 text-white/80 fill-white/80"></i></div>` : ''}
                        
                        <div class="absolute bottom-3 md:bottom-4 left-0 w-full flex justify-center pointer-events-none">
                            <span class="bg-black/60 text-white text-[9px] md:text-xs px-3 py-1 md:py-1.5 rounded-full backdrop-blur-md font-medium">Tocar para ampliar</span>
                        </div>
                    </div>

                    <div class="p-3 md:p-4 flex flex-col flex-1 overflow-y-auto no-scrollbar">
                        <h3 class="text-lg md:text-2xl font-extrabold mb-3 md:mb-4 text-slate-800 dark:text-white leading-tight">${product.name}</h3>
                        
                        ${product.size ? `
                            <div class="mb-4 md:mb-6 clay-surface p-3 md:p-4">
                                <div class="flex justify-between items-center text-xs md:text-base font-semibold">
                                    <span class="text-slate-500 dark:text-neutral-400">Capacidade:</span> 
                                    <span class="text-slate-800 dark:text-neutral-200">${product.size}</span>
                                </div>
                            </div>
                        ` : ''}

                        <div class="mt-auto pt-2 md:pt-4">
                            <button onclick="handleRedirectWhatsApp('${product.name}')" class="w-full flex items-center justify-center gap-1.5 md:gap-2 text-white px-4 py-3 md:px-6 md:py-4 font-bold text-xs md:text-base clay-wa cursor-pointer">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 md:w-5 md:h-5" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.405-.883-.733-1.48-1.638-1.653-1.935-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z" />
                                </svg>
                                Pedir orçamento
                            </button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeProductModal() {
            const modal = document.getElementById('product-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function setFullscreenImage(src) {
            const modal = document.getElementById('fullscreen-modal');
            const content = document.getElementById('fullscreen-content');
            
            if (src) {
                closeProductModal();
                if (src.endsWith('.mp4')) {
                    content.innerHTML = `<video src="${src}" controls autoplay muted playsinline class="max-w-full max-h-[85vh] object-contain rounded-2xl clay-surface p-1 md:p-2 pointer-events-auto"></video>`;
                } else {
                    content.innerHTML = `<img src="${src}" alt="Ampliada" class="max-w-full max-h-[85vh] object-contain rounded-2xl clay-surface p-1 md:p-2 pointer-events-auto" />`;
                }
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                content.innerHTML = '';
            }
            lucide.createIcons();
        }

        function closeModals(e) {
            if (e.target.id === 'product-modal') closeProductModal();
            if (e.target.id === 'fullscreen-modal') setFullscreenImage(null);
        }

        function handleRedirectWhatsApp(productName = "") {
            const text = productName ? `${WHATSAPP_BASE_MSG}: ${productName}` : WHATSAPP_BASE_MSG;
            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
            
            const newWindow = window.open(url, '_blank');
            if (!newWindow || newWindow.closed || typeof newWindow.closed == 'undefined') {
                window.location.href = url;
            }
        }
    </script>
</body>
</html>
